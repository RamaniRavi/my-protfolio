<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <!-- Light gray background (Streamlit-like) -->
  <rect width="800" height="400" fill="#f0f2f6"/>

  <!-- Sidebar -->
  <rect width="190" height="400" fill="#262730"/>
  <rect width="190" height="50" fill="#1f2029"/>
  <text x="95" y="30" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" font-weight="bold" fill="white">ChurnPredict</text>
  <text x="95" y="44" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#9ea6b4">LightGBM + FastAPI</text>
  <!-- Nav items -->
  <rect x="0" y="58" width="190" height="28" fill="rgba(255,75,75,0.15)"/>
  <rect x="0" y="58" width="4" height="28" fill="#ff4b4b"/>
  <text x="18" y="77" font-family="Arial,sans-serif" font-size="12" fill="#ff4b4b">Dashboard</text>
  <text x="18" y="108" font-family="Arial,sans-serif" font-size="12" fill="#8892a4">Predict Customer</text>
  <text x="18" y="136" font-family="Arial,sans-serif" font-size="12" fill="#8892a4">Model Performance</text>
  <text x="18" y="164" font-family="Arial,sans-serif" font-size="12" fill="#8892a4">Data Explorer</text>
  <text x="18" y="192" font-family="Arial,sans-serif" font-size="12" fill="#8892a4">Feature Importance</text>
  <line x1="10" y1="208" x2="180" y2="208" stroke="#3d3f4c" stroke-width="1"/>
  <text x="18" y="226" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">Dataset: Telco Churn</text>
  <text x="18" y="244" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">Samples: 7,043</text>
  <text x="18" y="262" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">Features: 19</text>
  <text x="18" y="280" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">Model: LightGBM</text>

  <!-- Main area -->
  <text x="208" y="26" font-family="Arial,sans-serif" font-size="17" font-weight="bold" fill="#262730">Customer Churn Dashboard</text>
  <text x="208" y="42" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">Binary classification to predict customer churn probability</text>

  <!-- Metric cards -->
  <rect x="208" y="54" width="142" height="62" rx="5" fill="white"/>
  <rect x="208" y="54" width="142" height="3" rx="3" fill="#ff4b4b"/>
  <text x="279" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">Accuracy</text>
  <text x="279" y="104" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#ff4b4b">87.3%</text>

  <rect x="362" y="54" width="142" height="62" rx="5" fill="white"/>
  <rect x="362" y="54" width="142" height="3" rx="3" fill="#4f46e5"/>
  <text x="433" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">ROC-AUC</text>
  <text x="433" y="104" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#4f46e5">0.912</text>

  <rect x="516" y="54" width="128" height="62" rx="5" fill="white"/>
  <rect x="516" y="54" width="128" height="3" rx="3" fill="#10b981"/>
  <text x="580" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">Precision</text>
  <text x="580" y="104" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#10b981">84.2%</text>

  <rect x="656" y="54" width="120" height="62" rx="5" fill="white"/>
  <rect x="656" y="54" width="120" height="3" rx="3" fill="#f59e0b"/>
  <text x="716" y="78" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">Recall</text>
  <text x="716" y="104" text-anchor="middle" font-family="Arial,sans-serif" font-size="24" font-weight="bold" fill="#f59e0b">79.6%</text>

  <!-- Confusion Matrix panel -->
  <rect x="208" y="130" width="268" height="192" rx="5" fill="white"/>
  <text x="342" y="152" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#262730">Confusion Matrix</text>
  <!-- Axis labels -->
  <text x="296" y="172" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">Pred: No Churn</text>
  <text x="388" y="172" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">Pred: Churn</text>
  <!-- TN -->
  <rect x="246" y="177" width="82" height="60" rx="4" fill="#1e3a8a" fill-opacity="0.88"/>
  <text x="287" y="202" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="white">True Neg</text>
  <text x="287" y="224" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="white">3,421</text>
  <!-- FP -->
  <rect x="336" y="177" width="82" height="60" rx="4" fill="#1e3a8a" fill-opacity="0.22"/>
  <text x="377" y="202" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#374151">False Pos</text>
  <text x="377" y="224" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#374151">312</text>
  <!-- FN -->
  <rect x="246" y="245" width="82" height="60" rx="4" fill="#1e3a8a" fill-opacity="0.22"/>
  <text x="287" y="270" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#374151">False Neg</text>
  <text x="287" y="292" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="#374151">287</text>
  <!-- TP -->
  <rect x="336" y="245" width="82" height="60" rx="4" fill="#1e3a8a" fill-opacity="0.88"/>
  <text x="377" y="270" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="white">True Pos</text>
  <text x="377" y="292" text-anchor="middle" font-family="Arial,sans-serif" font-size="16" font-weight="bold" fill="white">1,243</text>

  <!-- Feature Importance panel -->
  <rect x="488" y="130" width="288" height="192" rx="5" fill="white"/>
  <text x="632" y="152" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="bold" fill="#262730">Feature Importance</text>
  <!-- Bar rows -->
  <text x="500" y="178" font-family="Arial,sans-serif" font-size="10" fill="#374151">Contract Type</text>
  <rect x="614" y="168" width="140" height="13" rx="3" fill="rgba(79,70,229,0.82)"/>
  <text x="760" y="179" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">0.21</text>

  <text x="500" y="205" font-family="Arial,sans-serif" font-size="10" fill="#374151">Monthly Charges</text>
  <rect x="614" y="195" width="113" height="13" rx="3" fill="rgba(79,70,229,0.65)"/>
  <text x="733" y="206" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">0.17</text>

  <text x="500" y="232" font-family="Arial,sans-serif" font-size="10" fill="#374151">Tenure</text>
  <rect x="614" y="222" width="93" height="13" rx="3" fill="rgba(79,70,229,0.52)"/>
  <text x="713" y="233" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">0.14</text>

  <text x="500" y="259" font-family="Arial,sans-serif" font-size="10" fill="#374151">Internet Service</text>
  <rect x="614" y="249" width="73" height="13" rx="3" fill="rgba(79,70,229,0.40)"/>
  <text x="693" y="260" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">0.11</text>

  <text x="500" y="286" font-family="Arial,sans-serif" font-size="10" fill="#374151">Online Security</text>
  <rect x="614" y="276" width="53" height="13" rx="3" fill="rgba(79,70,229,0.30)"/>
  <text x="673" y="287" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">0.08</text>

  <text x="500" y="313" font-family="Arial,sans-serif" font-size="10" fill="#374151">Payment Method</text>
  <rect x="614" y="303" width="40" height="13" rx="3" fill="rgba(79,70,229,0.20)"/>
  <text x="660" y="314" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">0.06</text>

  <!-- Live Prediction panel -->
  <rect x="208" y="334" width="568" height="54" rx="5" fill="white"/>
  <text x="222" y="354" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="#262730">Live Prediction</text>
  <text x="222" y="372" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">Monthly: $65.70</text>
  <rect x="308" y="363" width="140" height="6" rx="3" fill="#e5e7eb"/>
  <rect x="308" y="363" width="87" height="6" rx="3" fill="#4f46e5"/>
  <circle cx="395" cy="366" r="5" fill="#4f46e5"/>
  <text x="430" y="372" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">Tenure: 24 mo.</text>
  <rect x="512" y="363" width="120" height="6" rx="3" fill="#e5e7eb"/>
  <rect x="512" y="363" width="50" height="6" rx="3" fill="#4f46e5"/>
  <circle cx="562" cy="366" r="5" fill="#4f46e5"/>
  <text x="222" y="384" font-family="Arial,sans-serif" font-size="10" fill="#6b7280">Contract: Month-to-Month</text>

  <!-- Prediction result -->
  <rect x="658" y="334" width="118" height="54" rx="5" fill="#fef2f2" stroke="#fecaca" stroke-width="1"/>
  <text x="717" y="352" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#6b7280">Churn Probability</text>
  <text x="717" y="373" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="#ef4444">23.4%</text>
  <text x="717" y="384" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" fill="#10b981">Low Risk</text>
</svg>
